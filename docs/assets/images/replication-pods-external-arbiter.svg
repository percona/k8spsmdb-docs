    <text x="40" y="58" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#3465a4">Operator</text>
    <polygon points="55,78 75,68 95,78 95,98 75,108 55,98" fill="#326ce5" stroke="#326ce5"/>
    <rect x="48" y="82" width="54" height="12" fill="#ffffff"/>

    <text x="40" y="135" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#3465a4">ReplicaSet</text>
    <g transform="translate(40,145)">
      <rect x="0" y="0" width="52" height="52" rx="6" fill="#326ce5"/>
      <path d="M10,18 L26,10 L42,18 L42,34 L26,42 L10,34 Z" fill="#ffffff"/>
      <text x="26" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#3465a4">DB Pod 0</text>
    </g>
    <g transform="translate(110,145)">
      <rect x="0" y="0" width="52" height="52" rx="6" fill="#326ce5"/>
      <path d="M10,18 L26,10 L42,18 L42,34 L26,42 L10,34 Z" fill="#ffffff"/>
      <text x="26" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#3465a4">DB Pod 1</text>
    </g>

    <text x="40" y="245" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#3465a4">Config Server ReplicaSet</text>
    <g transform="translate(40,255)">
      <rect x="0" y="0" width="52" height="52" rx="6" fill="#326ce5"/>
      <path d="M10,18 L26,10 L42,18 L42,34 L26,42 L10,34 Z" fill="#ffffff"/>
      <text x="26" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#3465a4">DB Pod 0</text>
    </g>
    <g transform="translate(110,255)">
      <rect x="0" y="0" width="52" height="52" rx="6" fill="#326ce5"/>
      <path d="M10,18 L26,10 L42,18 L42,34 L26,42 L10,34 Z" fill="#ffffff"/>
      <text x="26" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#3465a4">DB Pod 1</text>
