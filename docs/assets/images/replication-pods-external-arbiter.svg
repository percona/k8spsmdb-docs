    <text x="425" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#597fa7">Replica site</text>
    <text x="320" y="58" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#092257">unmanaged: true</text>

    <text x="320" y="135" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#3465a4">ReplicaSet</text>
    <g transform="translate(320,145)">
