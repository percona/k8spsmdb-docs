  <!-- External arbiter site -->
  <g id="external-arbiter-site">
    <rect x="620" y="30" width="280" height="330" rx="12" fill="#eef3f8" stroke="#597fa7" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="760" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#597fa7">External site</text>
    <text x="640" y="58" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#092257">Outside Kubernetes</text>

    <rect x="690" y="130" width="140" height="110" rx="10" fill="#ffffff" stroke="#729fcf" stroke-width="2"/>
    <circle cx="760" cy="165" r="22" fill="none" stroke="#3465a4" stroke-width="3"/>
    <text x="760" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#3465a4">A</text>
    <text x="760" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#3465a4">External arbiter</text>
    <text x="760" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#092257">arbiterOnly: true</text>
    <text x="760" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#092257">votes: 1, priority: 0</text>
  </g>

  <!-- Data replication arrows -->
  <path d="M145,190 C220,120 300,120 375,190" fill="none" stroke="#092257" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M375,230 C300,300 220,300 145,230" fill="none" stroke="#092257" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="260" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#092257">Data replication</text>

  <!-- Arbiter election links -->
  <path d="M270,320 C430,360 560,360 690,320" fill="none" stroke="#597fa7" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-muted)"/>
  <text x="480" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#597fa7">Shared external arbiter (Operator 1.23.0+)</text>
